<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <!-- Road Gradient -->
    <linearGradient id="roadGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c7d2fe" />
    </linearGradient>
    <!-- Accent Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base with rounded corners (compliant with maskable icons) -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Outer Ring Glow -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#4f46e5" stroke-width="4" opacity="0.3" />
  <circle cx="256" cy="256" r="200" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.15" />

  <!-- Winding Road Route -->
  <path d="M 256 440 C 256 360, 120 380, 120 280 C 120 180, 392 200, 392 120 C 392 60, 290 80, 256 72" 
        fill="none" stroke="url(#roadGrad)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  
  <!-- Road Inner Dark Line -->
  <path d="M 256 440 C 256 360, 120 380, 120 280 C 120 180, 392 200, 392 120 C 392 60, 290 80, 256 72" 
        fill="none" stroke="#1e1b4b" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Dashed Center Divider Line -->
  <path d="M 256 440 C 256 360, 120 380, 120 280 C 120 180, 392 200, 392 120 C 392 60, 290 80, 256 72" 
        fill="none" stroke="#fbbf24" stroke-width="4" stroke-dasharray="14 14" stroke-linecap="round" />

  <!-- Waypoint Map Pins -->
  <!-- Pin 1: Origin (Green) -->
  <g transform="translate(256, 440)">
    <circle r="12" fill="#22c55e" filter="url(#glow)" />
    <circle r="6" fill="#ffffff" />
  </g>

  <!-- Pin 2: Intermediate Layover (Orange/Amber) -->
  <g transform="translate(210, 243)">
    <circle r="14" fill="#f97316" filter="url(#glow)" />
    <circle r="7" fill="#ffffff" />
  </g>

  <!-- Pin 3: Destination (Red) -->
  <g transform="translate(256, 72)">
    <circle r="12" fill="#ef4444" filter="url(#glow)" />
    <circle r="6" fill="#ffffff" />
  </g>

  <!-- Stylized Sleek Motorcycle Symbol Overlay -->
  <g transform="translate(256, 256) scale(1.4)">
    <circle cx="0" cy="-10" r="16" fill="#fbbf24" filter="url(#glow)" opacity="0.8" />
    <!-- Sleek Bike Body Line -->
    <path d="M -30 10 L 30 10 L 20 -5 L -15 -5 Z" fill="#ffffff" />
    <!-- Wheels -->
    <circle cx="-22" cy="12" r="11" fill="#1e293b" stroke="#ffffff" stroke-width="4" />
    <circle cx="-22" cy="12" r="3" fill="#ffffff" />
    <circle cx="22" cy="12" r="11" fill="#1e293b" stroke="#ffffff" stroke-width="4" />
    <circle cx="22" cy="12" r="3" fill="#ffffff" />
    <!-- Handlebars and windshield -->
    <path d="M -10 -5 L -2 -18 L 8 -18 L 4 -5" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  </g>
</svg>
